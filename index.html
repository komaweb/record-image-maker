<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  

  <link rel="icon" href="favicon.ico">

  <title>戦績画像メーカー</title>

  <link
    rel="stylesheet"
    href="./style.css"
  >

</head>

<body>

  <h1>
  戦績画像メーカー
</h1>

<div class="preview-wrapper">
  <div class="preview-header-row">
  <button id="saveImageBtn">
    画像を保存する
  </button>

</div>

  <div id="previewArea"></div>

</div>
<div class="bottom-tabs">

  <button
    class="tab-btn active"
    data-tab="match"
  >

    <img
      src="match.png"
      class="tab-icon"
      alt=""
    >

    <span>
      対戦情報
    </span>

  </button>

  <button
  class="tab-btn"
  data-tab="info"
>

    <img
      src="tournament.png"
      class="tab-icon"
      alt=""
    >

    <span>
      大会情報
    </span>

  </button>

<button
  class="tab-btn"
  data-tab="image"
>

  <img
    src="image.png"
    class="tab-icon"
    alt=""
  >

  <span>
    写真追加
  </span>

</button>

<button
  class="tab-btn"
  data-tab="settings"
>

  <img
    src="settings.png"
    class="tab-icon"
    alt=""
  >

  <span>
    その他
  </span>

</button>
</div>
    <div class="input-area">

<details class="debug-area">

  <summary>
    現在の戦績
  </summary>

  <div id="summaryArea"></div>

</details>
  <details class="debug-area">

  <summary>
    対戦履歴
  </summary>

  <div id="recordArea"></div>

</details>
<div id="matchInputDetails">
  <div class="phase-select">

    <label>
      <input
        type="radio"
        name="phase"
        value="予選"
        checked
      >
      予選戦績に入力
    </label>

    <label>
      <input
        type="radio"
        name="phase"
        value="本戦"
      >
      本戦戦績に入力
    </label>

  </div>

  <br>

  <input
    type="text"
    id="deckName"
    placeholder="対戦相手のデッキ名"
  >
<br><br>
<label>
  <input
    type="radio"
    name="play"
    value=""
    checked
  >
  未選択
</label>
<label>
  <input
    type="radio"
    name="play"
    value="先攻"
    
  >
  先攻
</label>

<label>
  <input
    type="radio"
    name="play"
    value="後攻"
  >
  後攻
</label>


<br><br>
<label>
  <input
    type="radio"
    name="result"
    value=""
    checked
  >
  未選択
</label>
<label>
  <input
    type="radio"
    name="result"
    value="勝"
    
  >
  勝
</label>

<label>
  <input
    type="radio"
    name="result"
    value="負"
  >
  負
</label>

<br><br>

<button id="saveBtn">
 次の回戦へ
</button>
  <br>
<button id="deleteBtn"
  class="danger-btn">
  一番下の予選戦績を削除
</button>

</div>
<div id="imageTab">
  <div class="help-text">
  ヘッダーに表示する写真を追加できます
</div>  
  <div style="color:#888; font-size:14px; margin-top:4px;">
 ※入力された写真が勝手に送信・公開されることはありません。（サイトの管理人も見ることはできません。）
  </div>
<div style="color:#888; font-size:14px; margin-top:4px;">
  ※非常に大きな写真は自動で縮小されます。

</div>
      
<br>
  <input
  type="file"
  id="headerImageInput"
  accept="image/*"
>
<br><br>
<button
  type="button"
  id="removeHeaderImageBtn"
    class="danger-btn"
>
  ヘッダー写真を削除
</button>
   </div>
      <div id="infoTab">
<div class="input-group">

  <input
    type="text"
    id="myDeck"
    placeholder="自分の使用デッキ名を入力"
  >

  <input
    type="text"
    id="tournamentName"
    placeholder="大会名や見出し"
  >

  <input
    type="text"
    id="tournamentDate"
    placeholder="開催日やインデックス"
  >

</div>
<button id="todayBtn">
  現在の日付を自動入力
</button>


<h3 class="section-title">
  補足情報
</h3>

<div class="help-text">
  参加人数や大会形式などの追加入力にどうぞ
</div>

<div id="extraInfoArea"></div>

<br>

<button id="addInfoBtn">
  ＋補足情報を追加
</button>

<button
  id="removeInfoBtn"
    class="danger-btn"
  style="display:none;"
>
  最後の項目を削除
</button>

<hr>

<h3 class="section-title">
  最終順位
</h3>

<select id="finalResult">

  <option value="未選択" selected>
    未選択
  </option>

  <option>優勝</option>
  <option>準優勝</option>
  <option>3位</option>
  <option>4位</option>
  <option>ベスト8</option>
  <option>ベスト16</option>
  <option>ベスト32</option>
  <option>ベスト64</option>
  <option>ベスト128</option>
  <option>予選敗退</option>
  <option>その他(自分で入力)</option>

</select>

<br>

<input
  type="text"
  id="customResult"
  maxlength="12"
  placeholder="自由入力（12文字まで）"
  style="display:none;"
>

<button
  id="resetBtn"
  class="danger-btn"
>
  新しい大会に切り替える
</button>
      </div>
      
<div id="settingsTab">

  設定タブ（工事中）

</div>

</div>

<br><br>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="./script.js?v=999"></script>

</body>
</html>
