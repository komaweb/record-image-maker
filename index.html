<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>戦績画像メーカー</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G0V6WFMYGN"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-G0V6WFMYGN');
</script>
  <link rel="stylesheet" href="./style.css">
</head>
    
  <body>
  <h1>

  <span class="sub-title">
    完成イメージを見ながら作れる
  </span>

  戦績画像メーカー

</h1>


<div class="preview-wrapper">

  <div id="previewArea">

    ここに画像の見本が表示されます

  </div>

</div>

<div class="preview-header-row">

  <button id="saveImageBtn">
    画像を保存する
  </button>

</div>

<details class="debug-area">

  <summary>
    現在の戦績
  </summary>

  <div id="summaryArea"></div>

</details>

<details class="debug-area">

  <summary>
    対戦履歴
  </summary>

  <div id="recordArea"></div>

</details>

<details open>

  <summary>
    対戦結果を入力
  </summary>


  <div class="phase-select">

    <label>
      <input
        type="radio"
        name="phase"
        value="予選"
        checked
      >
      予選戦績に入力
    </label>

    <label>
      <input
        type="radio"
        name="phase"
        value="本戦"
      >
      本戦戦績に入力
    </label>

  </div>

  <br>

  <input
    type="text"
    id="deckName"
    placeholder="対戦相手のデッキ名"
  >
<br><br>

<label>
  <input
    type="radio"
    name="play"
    value="先攻"
    checked
  >
  先攻
</label>

<label>
  <input
    type="radio"
    name="play"
    value="後攻"
  >
  後攻
</label>

<label>
  <input
    type="radio"
    name="play"
    value="未記録"
  >
  未記録
</label>

<br><br>

<label>
  <input
    type="radio"
    name="result"
    value="勝"
    checked
  >
  勝
</label>

<label>
  <input
    type="radio"
    name="result"
    value="負"
  >
  負
</label>

<br><br>

<button id="saveBtn">
 この対戦結果を戦績に追加
</button>
  <br>
<button id="deleteBtn">
  ひとつ前に入力した対戦結果を削除
</button>
  </details>
<details>

  <summary>
    ヘッダー画像を設定
  </summary>
<div class="help-text">
  デッキ画像や推しの写真をどうぞ
</div>  
  <div style="color:#888; font-size:14px; margin-top:4px;">
 ※画像が勝手に送信・公開されることはありません。（サイトの管理人も見ることはできません。）
  </div>
<div style="color:#888; font-size:14px; margin-top:4px;">
  ※非常に大きな画像は自動で縮小されます。画像によっては画質が低下したり、読み込めない場合があります。
</div>
<br>
  <input
  type="file"
  id="headerImageInput"
  accept="image/*"
>
<br><br>
<button
  type="button"
  id="removeHeaderImageBtn"
>
  ヘッダー画像を削除
</button>
    </details>
<details>
  <summary>
    大会情報と最終順位
  </summary>

<h3 class="section-title">
  大会情報
</h3>

<div class="input-group">

  <input
    type="text"
    id="myDeck"
    placeholder="使用デッキ"
  >

  <input
    type="text"
    id="tournamentName"
    placeholder="大会名"
  >

  <input
    type="text"
    id="tournamentDate"
    placeholder="開催日"
  >

</div>
<button id="todayBtn">
  現在の日付を自動入力
</button>

<hr>

<h3 class="section-title">
  最終順位
</h3>

<select id="finalResult">

  <option value="未選択" selected>
    未選択
  </option>

  <option>優勝</option>
  <option>準優勝</option>
  <option>3位</option>
  <option>4位</option>
  <option>ベスト8</option>
  <option>ベスト16</option>
  <option>ベスト32</option>
  <option>ベスト64</option>
  <option>ベスト128</option>
  <option>予選敗退</option>
  <option>その他(自分で入力)</option>

</select>

<br>

<input
  type="text"
  id="customResult"
  maxlength="12"
  placeholder="自由入力（12文字まで）"
  style="display:none;"
>

<hr>

<h3 class="section-title">
  補足情報
</h3>

<div class="help-text">
  大会形式や参加人数などの入力にどうぞ
</div>
  <div id="extraInfoArea">

  <input
  type="text"
  class="extraInfo"
  placeholder="項目を入力"
>

</div>

<br>

<button id="addInfoBtn">
  ＋項目追加
</button>

<button id="removeInfoBtn">
  最後の項目を削除
</button>

</details>
    
<button id="resetBtn">
  新しい大会に切り替える
</button>
<br><br>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
